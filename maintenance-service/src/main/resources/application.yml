spring:
  application:
    name: maintenance-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/maintenance_db}
    username: ${DB_USERNAME:maintenance}
    password: ${DB_PASSWORD:maintenance}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8082
  forward-headers-strategy: framework

application:
  api-path: /api
  internal-path: /internal

management:
  endpoints:
    web:
      exposure:
        include: health,info

info:
  app:
    name: Maintenance Service
    java: 17

services:
  equipment:
    base-url: ${EQUIPMENT_SERVICE_URL:http://localhost:8081}
    cache-ttl: ${EQUIPMENT_CACHE_TTL:30s}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    filter: true
    urls-primary-name: "Публичное API заявок"
  api-docs:
    path: /v3/api-docs
