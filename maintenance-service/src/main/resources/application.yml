spring:
  application:
    name: maintenance-service

server:
  port: 8082

application:
  api-path: /api
  internal-path: /internal

management:
  endpoints:
    web:
      exposure:
        include: health,info

info:
  app:
    name: Maintenance Service
    java: 17

services:
  equipment:
    base-url: ${EQUIPMENT_SERVICE_URL:http://localhost:8081}
    cache-ttl: ${EQUIPMENT_CACHE_TTL:30s}
