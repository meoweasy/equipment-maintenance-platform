services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gateway/proxy_params:/etc/nginx/proxy_params:ro
    depends_on:
      equipment-service:
        condition: service_started
      maintenance-service:
        condition: service_started
    networks:
      - public
      - service-internal

  equipment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: equipment_db
      POSTGRES_USER: equipment
      POSTGRES_PASSWORD: equipment
    volumes:
      - equipment-db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equipment -d equipment_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - equipment-data
      - dev-access

  maintenance-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: maintenance_db
      POSTGRES_USER: maintenance
      POSTGRES_PASSWORD: maintenance
    volumes:
      - maintenance-db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maintenance -d maintenance_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - maintenance-data
      - dev-access

  equipment-service:
    build:
      context: .
      dockerfile: equipment-service/Dockerfile
    expose:
      - "8081"
    environment:
      DB_URL: jdbc:postgresql://equipment-db:5432/equipment_db
      DB_USERNAME: equipment
      DB_PASSWORD: equipment
      MAINTENANCE_SERVICE_URL: http://maintenance-service:8082
    depends_on:
      equipment-db:
        condition: service_healthy
    networks:
      - service-internal
      - equipment-data

  maintenance-service:
    build:
      context: .
      dockerfile: maintenance-service/Dockerfile
    expose:
      - "8082"
    environment:
      EQUIPMENT_SERVICE_URL: http://equipment-service:8081
      DB_URL: jdbc:postgresql://maintenance-db:5432/maintenance_db
      DB_USERNAME: maintenance
      DB_PASSWORD: maintenance
    depends_on:
      equipment-service:
        condition: service_started
      maintenance-db:
        condition: service_healthy
    networks:
      - service-internal
      - maintenance-data

networks:
  dev-access:
  public:
  service-internal:
    internal: true
  equipment-data:
    internal: true
  maintenance-data:
    internal: true

volumes:
  equipment-db-data:
  maintenance-db-data: