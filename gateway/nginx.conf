server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $equipment_upstream http://equipment-service:8081;
    set $maintenance_upstream http://maintenance-service:8082;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /api/equipment {
        proxy_pass $equipment_upstream;
        include /etc/nginx/proxy_params;
    }

    location ^~ /api/equipment/ {
        proxy_pass $equipment_upstream;
        include /etc/nginx/proxy_params;
    }

    location = /api/equipment-types {
        proxy_pass $equipment_upstream;
        include /etc/nginx/proxy_params;
    }

    location ^~ /api/equipment-types/ {
        proxy_pass $equipment_upstream;
        include /etc/nginx/proxy_params;
    }

    location = /api/service-requests {
        proxy_pass $maintenance_upstream;
        include /etc/nginx/proxy_params;
    }

    location ^~ /api/service-requests/ {
        proxy_pass $maintenance_upstream;
        include /etc/nginx/proxy_params;
    }

    location ^~ /internal/ {
        return 404;
    }

    location / {
        return 404;
    }
}